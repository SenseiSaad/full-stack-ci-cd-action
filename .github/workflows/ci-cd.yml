name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run migrations
      working-directory: backend
      run: python manage.py migrate
      env:
        DEBUG: "True"
        ALLOWED_HOSTS: localhost,127.0.0.1

    - name: Run tests
      working-directory: backend
      run: python manage.py test
      env:
        DEBUG: "True"
        ALLOWED_HOSTS: localhost,127.0.0.1

    - name: Check code style with flake8
      working-directory: backend
      run: |
        pip install flake8
        flake8 work_exp projects logs messages_app portfolio --max-line-length=100 --exclude=migrations

  docker:
    needs: backend
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build backend Docker image
      run: docker build -t portfolio-backend:${{ github.sha }} backend

    - name: Smoke test backend Docker image
      run: docker run --rm -e DEBUG=True -e SECRET_KEY=ci-test-secret portfolio-backend:${{ github.sha }} python manage.py --help

    - name: Build frontend Docker image
      run: docker build -t portfolio-frontend:${{ github.sha }} frontend

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Deployment handled by deploy.yml
      run: echo "ECR push and EC2 deploy are handled by the Build and Deploy to EC2 workflow."
