services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: summer_backend
    ports:
      - "8000:8000"
    environment:
      DEBUG: ${DJANGO_DEBUG:-True}
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-key}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,backend}
      DJANGO_SETTINGS_MODULE: portfolio.settings
      DATABASE_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-portfolio}
      DB_USER: ${DB_USER:-portfolio}
      DB_PASSWORD: ${DB_PASSWORD:-portfolio}
      DB_HOST: db
      DB_PORT: 5432
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8000}
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: summer_db
    environment:
      POSTGRES_DB: ${DB_NAME:-portfolio}
      POSTGRES_USER: ${DB_USER:-portfolio}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-portfolio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
