name: CI and Deploy to EC2

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  backend_checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Django project
        working-directory: backend
        run: python manage.py check
        env:
          DEBUG: "True"
          SECRET_KEY: ci-test-secret
          ALLOWED_HOSTS: localhost,127.0.0.1

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate
        env:
          DEBUG: "True"
          SECRET_KEY: ci-test-secret
          ALLOWED_HOSTS: localhost,127.0.0.1

      - name: Run backend tests
        working-directory: backend
        run: python manage.py test
        env:
          DEBUG: "True"
          SECRET_KEY: ci-test-secret
          ALLOWED_HOSTS: localhost,127.0.0.1

  docker_builds:
    needs: backend_checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t portfolio-backend:${{ github.sha }} backend

      - name: Smoke test backend image
        run: docker run --rm -e DEBUG=True -e SECRET_KEY=ci-test-secret portfolio-backend:${{ github.sha }} python manage.py --help

      - name: Build frontend image
        run: docker build -t portfolio-frontend:${{ github.sha }} frontend

  publish_images:
    needs: docker_builds
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.ECR_BACKEND_URL }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.ECR_FRONTEND_URL }}:latest

  deploy:
    needs: publish_images
    runs-on: ubuntu-latest
    concurrency:
      group: ec2-production-deploy
      cancel-in-progress: false

    steps:
      - name: Wait for images
        run: sleep 5

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || '22' }}
          script: |
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            mkdir -p /home/ubuntu/app
            cat > /home/ubuntu/app/.env <<'ENV'
            DEBUG=False
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
            DATABASE_ENGINE=django.db.backends.postgresql
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            AWS_STORAGE_BUCKET_NAME=${{ secrets.AWS_STORAGE_BUCKET_NAME }}
            AWS_S3_REGION_NAME=${{ secrets.AWS_S3_REGION_NAME }}
            CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
            ENV
            cat > /home/ubuntu/app/docker-compose.yml <<'COMPOSE'
            services:
              backend:
                image: ${{ secrets.ECR_BACKEND_URL }}:latest
                container_name: portfolio-backend
                restart: unless-stopped
                ports:
                  - "8000:8000"
                env_file:
                  - .env
              frontend:
                image: ${{ secrets.ECR_FRONTEND_URL }}:latest
                container_name: portfolio-frontend
                restart: unless-stopped
                ports:
                  - "3000:80"
                depends_on:
                  - backend
            COMPOSE
            cd /home/ubuntu/app
            docker pull ${{ secrets.ECR_BACKEND_URL }}:latest
            docker pull ${{ secrets.ECR_FRONTEND_URL }}:latest
            docker compose up -d --force-recreate
            if [ -f /etc/letsencrypt/live/slancer.site/fullchain.pem ] && [ -f /etc/letsencrypt/live/api.slancer.site/fullchain.pem ]; then
            sudo tee /etc/nginx/sites-available/portfolio >/dev/null <<'NGINX_SSL'
            server {
                listen 80 default_server;
                server_name slancer.site www.slancer.site;

                location /.well-known/acme-challenge/ {
                    root /var/www/html;
                }

                location / {
                    return 301 https://$host$request_uri;
                }
            }

            server {
                listen 80;
                server_name api.slancer.site;

                location /.well-known/acme-challenge/ {
                    root /var/www/html;
                }

                location / {
                    return 301 https://$host$request_uri;
                }
            }

            server {
                listen 443 ssl http2;
                server_name slancer.site www.slancer.site;

                ssl_certificate /etc/letsencrypt/live/slancer.site/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/slancer.site/privkey.pem;
                include /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

                client_max_body_size 20M;

                location / {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
            }

            server {
                listen 443 ssl http2;
                server_name api.slancer.site;

                ssl_certificate /etc/letsencrypt/live/api.slancer.site/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/api.slancer.site/privkey.pem;
                include /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

                client_max_body_size 20M;

                location = / {
                    return 302 /admin/;
                }

                location / {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
            }
            NGINX_SSL
            else
            sudo tee /etc/nginx/sites-available/portfolio >/dev/null <<'NGINX'
            server {
                listen 80 default_server;
                server_name slancer.site www.slancer.site _;

                client_max_body_size 20M;

                location /.well-known/acme-challenge/ {
                    root /var/www/html;
                }

                location / {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
            }

            server {
                listen 80;
                server_name api.slancer.site;

                client_max_body_size 20M;

                location /.well-known/acme-challenge/ {
                    root /var/www/html;
                }

                location = / {
                    return 302 /admin/;
                }

                location / {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
            }
            NGINX
            fi
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo ln -sf /etc/nginx/sites-available/portfolio /etc/nginx/sites-enabled/portfolio
            sudo nginx -t
            sudo systemctl reload nginx
